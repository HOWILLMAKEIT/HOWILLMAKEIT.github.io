{{- if and .IsPage (.Param "ShowToc") -}}
<script>
(() => {
  const toc = document.querySelector('.post-single > details.toc');
  const content = document.querySelector('.post-content');
  if (!toc || !content) return;

  const links = [...toc.querySelectorAll('#TableOfContents a[href^="#"]')];
  const headings = [...content.querySelectorAll('h2[id], h3[id]')];
  if (!links.length || !headings.length) return;

  const summary = toc.querySelector('summary');
  const title = summary?.querySelector('.title');
  if (title) title.textContent = 'On this page';

  const percent = document.createElement('span');
  percent.className = 'toc-percent';
  percent.textContent = '0%';
  summary?.appendChild(percent);

  const track = document.createElement('div');
  track.className = 'toc-progress-track';
  track.setAttribute('aria-hidden', 'true');
  track.innerHTML = '<span class="toc-progress-bar"></span>';
  summary?.insertAdjacentElement('afterend', track);
  const bar = track.querySelector('.toc-progress-bar');

  const linkById = new Map(
    links.map(link => [decodeURIComponent(link.hash.slice(1)), link])
  );
  const desktop = window.matchMedia('(min-width: 1320px)');
  let activeLink = null;
  let ticking = false;

  const syncLayout = () => {
    if (desktop.matches) toc.open = true;
  };

  const activate = (heading) => {
    const next = heading ? linkById.get(heading.id) : null;
    if (!next || next === activeLink) return;
    activeLink?.classList.remove('is-active');
    activeLink?.removeAttribute('aria-current');
    next.classList.add('is-active');
    next.setAttribute('aria-current', 'location');
    activeLink = next;

    if (desktop.matches) {
      const inner = toc.querySelector('.inner');
      const top = next.offsetTop;
      const bottom = top + next.offsetHeight;
      if (top < inner.scrollTop || bottom > inner.scrollTop + inner.clientHeight) {
        next.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    }
  };

  const update = () => {
    ticking = false;
    const readingLine = window.innerHeight * 0.28;
    let current = headings[0];
    for (const heading of headings) {
      if (heading.getBoundingClientRect().top <= readingLine) current = heading;
      else break;
    }
    activate(current);

    const start = content.getBoundingClientRect().top + window.scrollY;
    const distance = Math.max(content.offsetHeight - window.innerHeight * 0.55, 1);
    const progress = Math.min(100, Math.max(0, ((window.scrollY - start) / distance) * 100));
    const rounded = Math.round(progress);
    percent.textContent = `${rounded}%`;
    bar.style.width = `${progress}%`;
  };

  const requestUpdate = () => {
    if (!ticking) {
      ticking = true;
      requestAnimationFrame(update);
    }
  };

  syncLayout();
  update();
  desktop.addEventListener?.('change', syncLayout);
  window.addEventListener('scroll', requestUpdate, { passive: true });
  window.addEventListener('resize', requestUpdate, { passive: true });
})();
</script>
{{- end -}}

{{- if .IsHome -}}
<script>
(() => {
  const widget = document.querySelector('[data-support-widget]');
  if (!widget) return;

  const button = widget.querySelector('.support-button');
  const likedKey = 'howillmakeit.blog.support.liked';

  const render = (liked) => {
    button.setAttribute('aria-pressed', String(liked));
    button.setAttribute('aria-label', liked ? '取消为博客点赞' : '为博客点赞');
  };

  let liked = localStorage.getItem(likedKey) === 'true';
  render(liked);

  button.addEventListener('click', () => {
    liked = !liked;
    localStorage.setItem(likedKey, String(liked));
    render(liked);

  });
})();
</script>
{{- end -}}
